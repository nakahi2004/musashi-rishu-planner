<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>武蔵履修プランナー – デモ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root {
  --bg:#f4f4f8; --surface:#ffffff; --surface2:#ededf4;
  --border:#dcdcec; --border2:#c8c8e0;
  --text:#1a1a2e; --text2:#5c5c80; --text3:#a0a0be;
  --accent:#6c63ff; --accent2:#4a42d4;
  --tag-lec:#e6effe; --tag-lec-t:#1a50a0;
  --tag-sem:#e4f7ed; --tag-sem-t:#1a6b38;
  --tag-prac:#fef1e6; --tag-prac-t:#b05810;
  --req-h:#fde8e8; --req-h-t:#c02828;
  --req-s:#e6effe; --req-s-t:#1a40a0;
  --tag-done:#e2faec; --tag-done-t:#1a6e36;
  --tag-warn:#fef0e0; --tag-warn-t:#c06010;
  --prio-a:#dc2626; --prio-b:#d97706; --prio-c:#16a34a; --prio-d:#6b7280;
  --prio-a-bg:#eeebff; --prio-a-t:#5040c8;
}
body { font-family:"Noto Sans JP",sans-serif; background:var(--bg); color:var(--text); font-size:13px; line-height:1.6; min-height:100vh; }
.app { display:grid; grid-template-rows:52px 1fr; height:100vh; }
.topbar { display:flex; align-items:center; gap:16px; padding:0 20px; background:var(--surface); border-bottom:1px solid var(--border); }
.topbar h1 { font-size:14px; font-weight:500; flex-shrink:0; }
.topbar h1 span { color:var(--accent); }
.demo-badge { font-size:10px; font-family:"DM Mono",monospace; padding:2px 8px; background:color-mix(in srgb,var(--prio-b) 15%,transparent); border:1px solid color-mix(in srgb,var(--prio-b) 40%,transparent); color:var(--prio-b); border-radius:4px; font-weight:500; flex-shrink:0; letter-spacing:.05em; }
.search-wrap { flex:1; max-width:320px; position:relative; }
.search-wrap input { width:100%; padding:6px 12px 6px 32px; background:var(--surface2); border:1px solid var(--border); border-radius:6px; color:var(--text); font-size:12px; font-family:inherit; outline:none; transition:border-color .15s; }
.search-wrap input:focus { border-color:var(--accent); }
.search-wrap .icon { position:absolute; left:10px; top:50%; transform:translateY(-50%); color:var(--text3); font-size:12px; pointer-events:none; }
.stats { font-family:"DM Mono",monospace; font-size:11px; color:var(--text2); flex-shrink:0; }
.stats strong { color:var(--accent); }
.btn-ghost { padding:5px 10px; border:1px solid var(--border); background:none; color:var(--text2); border-radius:5px; cursor:pointer; font-size:11px; font-family:inherit; transition:all .15s; flex-shrink:0; }
.btn-ghost:hover { border-color:var(--accent); color:var(--text); }
.body { display:grid; grid-template-columns:280px 1fr; overflow:hidden; }
.tree-panel { background:var(--surface); border-right:1px solid var(--border); overflow-y:auto; padding:12px 0; }
.h1-row { display:flex; align-items:center; gap:8px; padding:8px 16px; cursor:pointer; user-select:none; transition:background .12s; }
.h1-row:hover { background:var(--surface2); }
.h1-row.active { background:color-mix(in srgb,var(--accent) 12%,transparent); }
.chevron { width:14px; height:14px; flex-shrink:0; display:flex; align-items:center; justify-content:center; color:var(--text3); transition:transform .2s; }
.chevron.open { transform:rotate(90deg); }
.chevron svg { width:10px; height:10px; }
.h1-name { font-size:13px; font-weight:500; flex:1; }
.count-badge { font-family:"DM Mono",monospace; font-size:10px; color:var(--text3); padding:1px 5px; background:var(--surface2); border-radius:10px; border:1px solid var(--border); }
.h2-row { display:flex; align-items:center; gap:8px; padding:5px 16px 5px 32px; cursor:pointer; user-select:none; color:var(--text2); transition:background .12s; }
.h2-row:hover { background:var(--surface2); color:var(--text); }
.h2-row.active { color:var(--accent); background:color-mix(in srgb,var(--accent) 8%,transparent); }
.h2-name { font-size:12px; flex:1; }
.h3-row { display:flex; align-items:center; gap:8px; padding:4px 16px 4px 48px; cursor:pointer; user-select:none; color:var(--text3); font-size:11px; transition:background .12s; }
.h3-row:hover { background:var(--surface2); color:var(--text2); }
.h3-row.active { color:var(--accent); }
.h3-name { flex:1; }
.dot { width:4px; height:4px; border-radius:50%; background:currentColor; flex-shrink:0; }
.list-panel { overflow-y:auto; padding:20px; }
.breadcrumb { display:flex; align-items:center; gap:6px; font-size:11px; color:var(--text3); margin-bottom:16px; flex-wrap:wrap; }
.breadcrumb .sep { color:var(--border2); }
.breadcrumb .current { color:var(--text2); }
.section-header { display:flex; align-items:baseline; gap:10px; margin-bottom:14px; }
.section-title { font-size:16px; font-weight:500; }
.section-count { font-family:"DM Mono",monospace; font-size:12px; color:var(--text3); }
.course-grid { display:flex; flex-direction:column; gap:4px; }
.course-card { display:grid; grid-template-columns:1fr auto; align-items:start; gap:8px; padding:10px 14px; background:var(--surface); border:1px solid var(--border); border-radius:8px; cursor:pointer; transition:border-color .12s,background .12s; }
.course-card:hover { border-color:var(--accent); background:color-mix(in srgb,var(--accent) 5%,var(--surface)); }
.course-card.card-done { background:var(--tag-done); border-color:color-mix(in srgb,var(--tag-done-t) 30%,transparent); }
.course-card.card-done:hover { background:color-mix(in srgb,var(--tag-done-t) 12%,var(--tag-done)); }
.course-card.card-warn { background:var(--tag-warn); border-color:color-mix(in srgb,var(--tag-warn-t) 30%,transparent); }
.course-card.card-warn:hover { background:color-mix(in srgb,var(--tag-warn-t) 12%,var(--tag-warn)); }
.card-main { min-width:0; }
.card-name { font-size:13px; font-weight:500; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:4px; }
.card-meta { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
.card-right { display:flex; flex-direction:column; align-items:flex-end; gap:4px; }
.card-id { font-family:"DM Mono",monospace; font-size:10px; color:var(--text3); }
.tag { font-size:10px; padding:1px 6px; border-radius:4px; font-family:"DM Mono",monospace; white-space:nowrap; }
.tag-lec  { background:var(--tag-lec);  color:var(--tag-lec-t); }
.tag-sem  { background:var(--tag-sem);  color:var(--tag-sem-t); }
.tag-prac { background:var(--tag-prac); color:var(--tag-prac-t); }
.tag-req-h { background:var(--req-h); color:var(--req-h-t); }
.tag-req-s { background:var(--req-s); color:var(--req-s-t); }
.tag-done  { background:var(--tag-done); color:var(--tag-done-t); }
.tag-warn  { background:var(--tag-warn); color:var(--tag-warn-t); }
.grade-tag { font-size:10px; color:var(--text3); font-family:"DM Mono",monospace; }
.units-tag { font-size:10px; color:var(--text2); font-family:"DM Mono",monospace; }
.copy-btn { padding:3px 8px; background:none; border:1px solid var(--border); border-radius:4px; color:var(--text3); cursor:pointer; font-size:10px; font-family:inherit; transition:all .15s; white-space:nowrap; }
.copy-btn:hover { border-color:var(--accent); color:var(--accent); }
.copy-btn.copied { border-color:var(--tag-sem-t); color:var(--tag-sem-t); }
.empty { text-align:center; padding:60px 20px; color:var(--text3); font-size:13px; }
.modal-bg { position:fixed; inset:0; background:rgba(60,60,100,.35); z-index:100; display:flex; align-items:center; justify-content:center; padding:20px; opacity:0; pointer-events:none; transition:opacity .2s; }
.modal-bg.open { opacity:1; pointer-events:all; }
.modal { background:var(--surface2); border:1px solid var(--border2); border-radius:12px; padding:24px; width:100%; max-width:480px; max-height:calc(100vh - 60px); overflow-y:auto; transform:translateY(6px); transition:transform .2s; }
.modal-bg.open .modal { transform:translateY(0); }
.modal-top { display:flex; justify-content:space-between; align-items:flex-start; gap:12px; margin-bottom:16px; }
.modal-name { font-size:17px; font-weight:500; line-height:1.4; }
.modal-close { background:none; border:1px solid var(--border); color:var(--text2); width:28px; height:28px; border-radius:6px; cursor:pointer; font-size:14px; transition:all .12s; flex-shrink:0; }
.modal-close:hover { border-color:var(--accent); color:var(--text); }
.modal-pills { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:16px; }
.pill { font-size:11px; padding:3px 10px; background:var(--surface); border:1px solid var(--border); border-radius:20px; color:var(--text2); font-family:"DM Mono",monospace; }
.pill-done { background:var(--tag-done); border-color:var(--tag-done-t); color:var(--tag-done-t); }
.pill-warn { background:var(--tag-warn); border-color:var(--tag-warn-t); color:var(--tag-warn-t); }
.modal-field { margin-bottom:10px; }
.modal-field label { display:block; font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--text3); margin-bottom:4px; }
.modal-field p { font-size:12px; color:var(--text2); }
.modal-path { display:flex; align-items:center; gap:4px; font-size:11px; color:var(--text3); flex-wrap:wrap; }
.modal-path .sep { color:var(--border2); }
.modal-path .seg { color:var(--text2); }
.hl { background:color-mix(in srgb,var(--accent) 30%,transparent); border-radius:2px; }
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border2); border-radius:4px; }
/* priority */
.prio-badge { font-family:"DM Mono",monospace; font-size:10px; font-weight:700; padding:1px 7px; border-radius:4px; letter-spacing:.05em; color:#fff; }
.prio-A { background:var(--prio-a); }
.prio-B { background:var(--prio-b); }
.prio-C { background:var(--prio-c); }
.prio-D { background:var(--prio-d); }
.prio-btns { display:flex; gap:6px; flex-wrap:wrap; }
.prio-btn { padding:4px 14px; border:1px solid var(--border); background:none; color:var(--text3); border-radius:6px; cursor:pointer; font-size:12px; font-family:"DM Mono",monospace; font-weight:700; transition:all .12s; }
.prio-btn:hover { border-color:var(--border2); color:var(--text); }
.prio-btn.sel-A { background:var(--prio-a); border-color:var(--prio-a); color:#fff; }
.prio-btn.sel-B { background:var(--prio-b); border-color:var(--prio-b); color:#fff; }
.prio-btn.sel-C { background:var(--prio-c); border-color:var(--prio-c); color:#fff; }
.prio-btn.sel-D { background:var(--prio-d); border-color:var(--prio-d); color:#fff; }
.prio-btn.sel-none { border-color:var(--border2); color:var(--text3); }
.prio-desc { display:flex; flex-direction:column; gap:3px; margin-top:8px; }
.prio-desc-item { display:flex; align-items:center; gap:7px; font-size:11px; color:var(--text2); }
.prio-desc-item .prio-badge { flex-shrink:0; }
/* 単位状況 */
.credits-wrap { padding:20px; overflow-y:auto; height:100%; }
.credits-summary { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:20px 24px; margin-bottom:16px; }
.credits-summary-label { font-size:11px; font-weight:500; color:var(--text2); margin-bottom:8px; }
.credits-summary-nums { display:flex; align-items:baseline; gap:4px; flex-wrap:wrap; margin-bottom:10px; }
.credits-big { font-size:32px; font-weight:500; font-family:"DM Mono",monospace; color:var(--text); line-height:1; }
.credits-enrolled-s { font-size:12px; color:var(--text3); font-family:"DM Mono",monospace; }
.credits-slash { font-size:18px; color:var(--text3); }
.credits-req-s { font-size:16px; color:var(--text2); font-family:"DM Mono",monospace; }
.credits-rem-s { font-size:12px; margin-left:8px; }
.credits-rem-s.ok { color:var(--prio-c); }
.credits-rem-s.ng { color:var(--prio-a); }
.credits-bar-outer { height:8px; background:var(--surface2); border-radius:4px; overflow:hidden; }
.credits-bar-inner { height:100%; background:var(--accent); border-radius:4px; transition:width .4s; }
.credits-table { background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; margin-bottom:8px; }
.credits-th { display:grid; grid-template-columns:1fr 44px 44px 62px 80px; padding:7px 16px; background:var(--surface2); border-bottom:1px solid var(--border); font-size:10px; color:var(--text3); font-weight:500; gap:4px; }
.credits-row { display:grid; grid-template-columns:1fr 44px 44px 62px 80px; padding:0 16px; border-bottom:1px solid var(--border); align-items:center; min-height:34px; gap:4px; transition:background .12s; }
.credits-row:last-child { border-bottom:none; }
.credits-row.hidden { display:none; }
.credits-row.l1 { cursor:pointer; background:color-mix(in srgb,var(--surface2) 60%,transparent); font-weight:500; font-size:12px; }
.credits-row.l1:hover { background:var(--surface2); }
.credits-row.l2 { padding-left:32px; font-size:12px; color:var(--text); }
.credits-row.l3 { padding-left:52px; font-size:11px; color:var(--text2); }
.credits-chev { display:inline-block; font-size:8px; color:var(--text3); margin-right:6px; transition:transform .15s; user-select:none; }
.credits-chev.open { transform:rotate(90deg); }
.credits-name { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.credits-val { font-family:"DM Mono",monospace; font-size:11px; color:var(--text2); text-align:right; }
.credits-rem { font-family:"DM Mono",monospace; font-size:10px; text-align:right; }
.credits-rem.ok  { color:var(--prio-c); }
.credits-rem.warn{ color:var(--prio-b); }
.credits-rem.ng  { color:var(--prio-a); }
.credits-bar { height:6px; background:var(--surface2); border-radius:3px; overflow:hidden; }
.credits-fill { height:100%; border-radius:3px; }
.credits-fill.ok   { background:var(--prio-c); }
.credits-fill.warn { background:var(--prio-b); }
.credits-fill.ng   { background:var(--prio-a); }
.credits-fill.na   { background:var(--text3); }
/* memo */
.modal-memo { width:100%; padding:8px 10px; background:var(--bg); border:1px solid var(--border2); border-radius:6px; color:var(--text); font-size:12px; font-family:"Noto Sans JP",sans-serif; resize:vertical; min-height:60px; outline:none; line-height:1.6; }
.modal-memo:focus { border-color:var(--accent); }
.modal-memo::placeholder { color:var(--text3); }
.syllabus-btn { display:flex; align-items:center; justify-content:center; gap:7px; width:100%; padding:8px 12px; background:none; border:1px solid var(--border); border-radius:7px; color:var(--text2); font-size:12px; font-family:inherit; cursor:pointer; transition:all .15s; margin-bottom:14px; }
.syllabus-btn:hover { border-color:var(--accent); color:var(--accent); background:color-mix(in srgb,var(--accent) 6%,transparent); }
.syllabus-btn svg { flex-shrink:0; }
.toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(10px); background:var(--text); color:var(--surface); padding:8px 18px; border-radius:8px; font-size:12px; opacity:0; transition:opacity .18s, transform .18s; z-index:300; pointer-events:none; white-space:nowrap; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
/* settings drawer */
.settings-overlay { position:fixed; inset:0; z-index:149; display:none; }
.settings-overlay.open { display:block; }
.settings-drawer { position:fixed; top:0; right:0; bottom:0; width:300px; background:var(--surface2); border-left:1px solid var(--border2); z-index:150; transform:translateX(100%); transition:transform .25s cubic-bezier(.4,0,.2,1); display:flex; flex-direction:column; }
.settings-drawer.open { transform:translateX(0); }
.settings-head { display:flex; align-items:center; justify-content:space-between; padding:16px 20px; border-bottom:1px solid var(--border); flex-shrink:0; }
.settings-head h2 { font-size:14px; font-weight:500; }
.settings-body { flex:1; overflow-y:auto; padding:16px 20px; }
.settings-sec { margin-bottom:28px; }
.settings-sec-title { font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--text3); margin-bottom:12px; }
.settings-row { display:flex; align-items:center; justify-content:space-between; gap:12px; padding:9px 0; border-bottom:1px solid var(--border); }
.settings-row:last-child { border-bottom:none; }
.settings-row-label { font-size:12px; color:var(--text2); flex:1; line-height:1.4; }
.settings-row-sub { font-size:10px; color:var(--text3); margin-top:2px; }
.settings-btn { padding:5px 12px; border:1px solid var(--border); background:none; color:var(--text2); border-radius:5px; cursor:pointer; font-size:11px; font-family:inherit; transition:all .15s; white-space:nowrap; flex-shrink:0; }
.settings-btn:hover { border-color:var(--accent); color:var(--text); }
.settings-btn-danger { border-color:color-mix(in srgb,var(--req-h-t) 40%,transparent); color:var(--req-h-t); }
.settings-btn-danger:hover { border-color:var(--req-h-t); background:var(--req-h); }
.settings-notice { font-size:11px; color:var(--tag-sem-t); padding:6px 10px; background:var(--tag-sem); border-radius:5px; margin-top:8px; display:none; }
/* toggle buttons */
.toggle-btns { display:flex; gap:5px; flex-wrap:wrap; }
.toggle-btn { padding:3px 10px; border:1px solid var(--border); background:none; color:var(--text3); border-radius:5px; cursor:pointer; font-size:11px; font-family:inherit; transition:all .12s; }
.toggle-btn:hover { border-color:var(--accent); color:var(--text); }
.toggle-btn.sel { background:color-mix(in srgb,var(--accent) 18%,transparent); border-color:var(--accent); color:var(--accent); }
/* slot editor */
.slot-editor { display:flex; flex-direction:column; gap:8px; }
.slot-editor-row { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.slot-add-btn { padding:4px 12px; border:1px solid var(--border2); background:var(--surface); color:var(--text2); border-radius:5px; cursor:pointer; font-size:11px; font-family:inherit; transition:all .15s; white-space:nowrap; }
.slot-add-btn.inactive { opacity:.35; cursor:not-allowed; }
.slot-add-btn.inactive:hover { border-color:var(--border2); color:var(--text2); }
.slot-add-btn.ready { background:var(--accent2); border-color:var(--accent); color:#fff; font-weight:500; }
.slot-add-btn.ready:hover { background:var(--accent); }
.slot-list { display:flex; gap:6px; flex-wrap:wrap; min-height:20px; }
.slot-tag { display:inline-flex; align-items:center; gap:4px; background:color-mix(in srgb,var(--accent) 14%,transparent); border:1px solid color-mix(in srgb,var(--accent) 35%,transparent); border-radius:12px; padding:2px 8px; font-size:11px; color:var(--accent); font-family:"DM Mono",monospace; }
.slot-remove { background:none; border:none; color:var(--accent); cursor:pointer; font-size:13px; padding:0; line-height:1; opacity:.55; }
.slot-remove:hover { opacity:1; }
.slot-mini { font-family:"DM Mono",monospace; font-size:10px; color:var(--text3); }
/* view tabs */
.view-tabs { display:flex; gap:2px; }
.view-tab { padding:4px 12px; border:1px solid transparent; background:none; color:var(--text3); border-radius:5px; cursor:pointer; font-size:11px; font-family:inherit; transition:all .12s; }
.view-tab:hover { color:var(--text2); }
.view-tab.active { border-color:var(--border2); background:var(--surface2); color:var(--text); font-weight:500; }
.cal-mode .tree-panel { display:none; }
.cal-mode .list-panel { grid-column:1/-1; padding:0; }
/* calendar */
.cal-wrap { display:flex; flex-direction:column; height:100%; }
.cal-controls { display:flex; align-items:center; gap:16px; padding:14px 20px 10px; flex-shrink:0; flex-wrap:wrap; border-bottom:1px solid var(--border); }
.cal-control-label { font-size:11px; color:var(--text3); flex-shrink:0; }
.cal-filter-btns { display:flex; gap:4px; }
.cal-filter-btn { padding:3px 10px; border:1px solid var(--border); background:none; color:var(--text3); border-radius:4px; cursor:pointer; font-size:11px; font-family:inherit; transition:all .12s; }
.cal-filter-btn:hover { border-color:var(--accent); color:var(--text); }
.cal-filter-btn.active { background:color-mix(in srgb,var(--accent) 18%,transparent); border-color:var(--accent); color:var(--accent); }
.cal-tip { font-size:10px; color:var(--text3); margin-left:auto; }
.cal-prio-filter { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
.cal-prio-item { display:flex; align-items:center; gap:5px; font-size:11px; color:var(--text2); cursor:pointer; user-select:none; }
.cal-prio-item input[type=checkbox] { accent-color:var(--accent); width:13px; height:13px; cursor:pointer; margin:0; }
.cal-prio-item .prio-badge { flex-shrink:0; }
.cal-scroll { flex:1; overflow:auto; }
.cal-grid { display:grid; grid-template-columns:40px repeat(5,1fr); grid-template-rows:auto repeat(5,100px); min-width:500px; }
.cal-corner { background:var(--surface); border-right:1px solid var(--border); border-bottom:1px solid var(--border2); }
.cal-hcell { background:var(--surface); border-right:1px solid var(--border); border-bottom:1px solid var(--border2); padding:6px 4px; text-align:center; font-size:11px; color:var(--text3); font-weight:500; }

// ── 単位状況 ─────────────────────────────────────────────
function initCreditsCollapsed() {
  creditsCollapsed = {};
  for (var i = 0; i < CREDITS.length; i++) {
    if (CREDITS[i].level === 1) {
      var n = CREDITS[i].name;
      creditsCollapsed[n] = (n === '総合' || n === '外国語');
    }
  }
}
function toggleCreditsSection(name) {
  creditsCollapsed[name] = !creditsCollapsed[name];
  renderCredits();
}
function renderCredits() {
  var lp = document.getElementById('list-panel');
  var summary = null;
  for (var i = 0; i < CREDITS.length; i++) {
    if (CREDITS[i].level === 0) { summary = CREDITS[i]; break; }
  }
  var h = '<div class="credits-wrap">';
  if (summary) {
    var e0  = (summary.earned || 0) + (summary.enrolled || 0);
    var r0  = summary.required || 0;
    var rem0 = Math.max(0, r0 - e0);
    var pct0 = r0 ? Math.min(100, Math.round(e0 / r0 * 100)) : 0;
    h += '<div class="credits-summary">';
    h += '<div class="credits-summary-label">単位修得状況</div>';
    h += '<div class="credits-summary-nums">';
    h += '<span class="credits-big">' + (summary.earned || 0) + '</span>';
    if (summary.enrolled) h += '<span class="credits-enrolled-s">&nbsp;+&nbsp;' + summary.enrolled + '&nbsp;(履修中)</span>';
    h += '<span class="credits-slash">&nbsp;/&nbsp;</span>';
    h += '<span class="credits-req-s">' + r0 + '&nbsp;単位</span>';
    h += '<span class="credits-rem-s ' + (rem0 > 0 ? 'ng' : 'ok') + '">';
    h += rem0 > 0 ? ('あと ' + rem0 + ' 単位') : '卒業要件充足';
    h += '</span></div>';
    h += '<div class="credits-bar-outer"><div class="credits-bar-inner" style="width:' + pct0 + '%"></div></div>';
    h += '</div>';
  }
  h += '<div class="credits-table">';
  h += '<div class="credits-th"><span>分類</span><span style="text-align:right">取得</span><span style="text-align:right">要件</span><span style="text-align:right">残り</span><span>進捗</span></div>';
  var curL1 = null;
  for (var i = 0; i < CREDITS.length; i++) {
    var item = CREDITS[i];
    if (item.level === 0) continue;
    var earned  = (item.earned || 0) + (item.enrolled || 0);
    var req     = item.required;
    var hasReq  = (req !== null && req !== undefined);
    var pct     = (hasReq && req > 0) ? Math.min(100, Math.round(earned / req * 100)) : null;
    var rem     = hasReq ? Math.max(0, req - earned) : null;
    var sc      = '';
    if (hasReq) { sc = earned >= req ? ' ok' : (pct !== null && pct >= 70 ? ' warn' : ' ng'); }
    var hiddenCls = (curL1 && creditsCollapsed[curL1]) ? ' hidden' : '';
    if (item.level === 1) {
      curL1 = item.name;
      var col = creditsCollapsed[item.name];
      h += '<div class="credits-row l1' + sc + '" onclick="toggleCreditsSection(\'' + eh(item.name) + '\')">';
      h += '<span class="credits-name"><span class="credits-chev' + (col ? '' : ' open') + '">▶</span>' + eh(item.name) + '</span>';
    } else if (item.level === 2) {
      h += '<div class="credits-row l2' + hiddenCls + sc + '">';
      h += '<span class="credits-name">' + eh(item.name) + '</span>';
    } else {
      h += '<div class="credits-row l3' + hiddenCls + sc + '">';
      h += '<span class="credits-name">' + eh(item.name) + '</span>';
    }
    h += '<span class="credits-val">' + (item.earned !== null && item.earned !== undefined ? (item.earned || 0) : '—') + '</span>';
    h += '<span class="credits-val">' + (hasReq ? req : '—') + '</span>';
    if (rem !== null) {
      h += '<span class="credits-rem' + sc + '">' + (rem === 0 ? '充足' : 'あと' + rem) + '</span>';
      h += '<div class="credits-bar"><div class="credits-fill' + sc + '" style="width:' + (pct || 0) + '%"></div></div>';
    } else {
      var fallPct = (item.earned && summary && summary.earned) ? Math.min(100, Math.round(item.earned / summary.earned * 100)) : 0;
      h += '<span class="credits-rem">—</span>';
      h += '<div class="credits-bar"><div class="credits-fill na" style="width:' + fallPct + '%"></div></div>';
    }
    h += '</div>';
  }
  h += '</div>';
  h += '<div style="font-size:10px;color:var(--text3);padding:6px 4px">ℹ 卒業要件に算入されない単位も含まれる場合があります。必ず履修要項で確認してください。</div>';
  h += '</div>';
  lp.innerHTML = h;
}

// ── 学期・コマ ────────────────────────────────────────────
var pendingDay = '';
var pendingPeriod = '';

function setSemester(val) {
  if (!ANNOT[currentModalKey]) ANNOT[currentModalKey] = {};

  ANNOT[currentModalKey].semester = (cur === val) ? '' : val;

}
function renderSemesterBtns(current) {

}
function selectDay(day) { pendingDay = (pendingDay === day) ? '' : day; renderDayBtns(); updateAddBtn(); }
function selectPeriod(p) { pendingPeriod = (pendingPeriod === p) ? '' : p; renderPeriodBtns(); updateAddBtn(); }
function renderDayBtns() {
  var days = ['月','火','水','木','金'];
  var html = '';
  for (var i = 0; i < days.length; i++) {
    html += '<button class="toggle-btn' + (days[i] === pendingDay ? ' sel' : '') + '" onclick="selectDay(\'' + days[i] + '\')">' + days[i] + '</button>';
  }
  document.getElementById('modal-day-btns').innerHTML = html;
}
function renderPeriodBtns() {
  var html = '';
  for (var i = 1; i <= 5; i++) {
    var p = String(i);
    html += '<button class="toggle-btn' + (p === pendingPeriod ? ' sel' : '') + '" onclick="selectPeriod(\'' + p + '\')">' + p + '限</button>';
  }
  document.getElementById('modal-period-btns').innerHTML = html;
}
function updateAddBtn() {
  var btn = document.getElementById('slot-add-btn');
  if (!btn) return;
  if (pendingDay && pendingPeriod) {
    btn.classList.remove('inactive'); btn.classList.add('ready');
    btn.textContent = pendingDay + '曜・' + pendingPeriod + '限を追加';
  } else {
    btn.classList.remove('ready'); btn.classList.add('inactive');
    btn.textContent = '+ 追加';
  }
}
function addSlot() {
  if (!pendingDay || !pendingPeriod) return;
  if (!ANNOT[currentModalKey]) ANNOT[currentModalKey] = {};
  var existing = ANNOT[currentModalKey].slots ? ANNOT[currentModalKey].slots.slice() : [];
  for (var i = 0; i < existing.length; i++) {
    if (existing[i][0] === pendingDay && existing[i][1] === pendingPeriod) {
      pendingDay = ''; pendingPeriod = '';
      renderDayBtns(); renderPeriodBtns(); updateAddBtn(); return;
    }
  }
  existing.push([pendingDay, pendingPeriod]);
  ANNOT[currentModalKey].slots = existing;
  saveAnnot();
  pendingDay = ''; pendingPeriod = '';
  renderDayBtns(); renderPeriodBtns(); updateAddBtn();
  renderSlotList();
}
function removeSlot(idx) {
  if (!ANNOT[currentModalKey] || !ANNOT[currentModalKey].slots) return;
  ANNOT[currentModalKey].slots.splice(idx, 1);
  saveAnnot();
  renderSlotList();
}
function renderSlotList() {
  var slots = (ANNOT[currentModalKey] || {}).slots || [];
  var html = '';
  for (var i = 0; i < slots.length; i++) {
    html += '<span class="slot-tag">' + eh(slots[i][0]) + eh(slots[i][1]) + '限'
          + ' <button class="slot-remove" onclick="removeSlot(' + i + ')">&#215;</button></span>';
  }
  document.getElementById('modal-slot-list').innerHTML = html;
}

// ── 優先度ボタン ──────────────────────────────────────────
function renderPrioBtns(current) {

  for (var i = 0; i < opts.length; i++) {

    var cls = 'prio-btn' + (isSel ? ' sel-' + (v === 'none' ? 'none' : v) : '');

// ── 設定ドロワー ──────────────────────────────────────────
function openSettings() {

  document.getElementById('settings-drawer').classList.add('open');
  document.getElementById('settings-overlay').classList.add('open');
}
function closeSettings() {
  document.getElementById('settings-drawer').classList.remove('open');
  document.getElementById('settings-overlay').classList.remove('open');
}
function showSettingsNotice(msg) {
  var el = document.getElementById('settings-notice');
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(function() { el.style.display = 'none'; }, 3000);
}
function exportAnnot() {
  var count = Object.keys(ANNOT).length;
  if (count === 0) { showSettingsNotice('保存するアノテーションがありません'); return; }
  var json = JSON.stringify(ANNOT, null, 2);
  var blob = new Blob([json], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  var now = new Date();
  var stamp = now.getFullYear() + ('0'+(now.getMonth()+1)).slice(-2) + ('0'+now.getDate()).slice(-2);
  a.href = url; a.download = 'coursebrowser_annot_' + stamp + '.json'; a.click();
  URL.revokeObjectURL(url);
  showSettingsNotice('✓ ' + count + ' 件のアノテーションを保存しました');
}
function importAnnot(input) {
  var file = input.files[0]; if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var imported = JSON.parse(e.target.result);
      var added = 0;
      for (var key in imported) {
        if (!ANNOT[key]) { ANNOT[key] = {}; }
        if (imported[key].prio !== undefined) { ANNOT[key].prio = imported[key].prio; }
        if (imported[key].memo !== undefined) { ANNOT[key].memo = imported[key].memo; }
        added++;
      }
      saveAnnot(); renderList();
      showSettingsNotice('✓ ' + added + ' 件のアノテーションを復元しました');
    } catch(err) { showSettingsNotice('エラー: JSONの読み込みに失敗しました'); }
    input.value = '';
  };
  reader.readAsText(file);
}
function clearAnnot() {
  var count = Object.keys(ANNOT).length;
  if (count === 0) { showSettingsNotice('削除するアノテーションがありません'); return; }
  if (!confirm(count + ' 件のアノテーション（優先度・メモ）をすべて削除しますか？\nこの操作は取り消せません。')) return;
  ANNOT = {}; saveAnnot(); renderList();
  showSettingsNotice('アノテーションを削除しました');
}

// ── ユーティリティ ────────────────────────────────────────
function eh(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function ej(s) {
  var r = '';
  for (var i = 0; i < s.length; i++) {
    var c = s.charAt(i);
    if (c === "'") { r += "\\'"; } else if (c === '\\') { r += '\\\\'; } else { r += c; }
  }
  return r;
}
function hlText(text, q) {
  if (!q) { return eh(text); }
  var result = ''; var lower = text.toLowerCase(); var lq = q.toLowerCase(); var i = 0;
  while (i < text.length) {
    var idx = lower.indexOf(lq, i);
    if (idx < 0) { result += eh(text.slice(i)); break; }
    result += eh(text.slice(i, idx));
    result += '<span class="hl">' + eh(text.slice(idx, idx + q.length)) + '</span>';
    i = idx + q.length;
  }
  return result;
}
function formTag(form) {
  if (form.indexOf('講義') >= 0) { return '<span class="tag tag-lec">講義</span>'; }
  if (form.indexOf('演習') >= 0) { return '<span class="tag tag-sem">演習</span>'; }
  var s = form.split('（')[0];
  return '<span class="tag tag-prac">' + eh(s) + '</span>';
}
function reqTag(req) {
  if (req === '必修') { return '<span class="tag tag-req-h">必修</span>'; }
  if (req === '選択') { return '<span class="tag tag-req-s">選択</span>'; }
  return '';
}
function chevSvg() {
  return '<svg viewBox="0 0 10 10"><path d="M3 2l4 3-4 3" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>';
}

// ── カウント・フィルタ ─────────────────────────────────────
var sel     = { h1: null, h2: null, h3: null };
var openH1  = new Set();
var openH2  = new Set();
var query   = '';
var hideDone = false;
var viewMode = 'list';

function toggleHideDone() {
  hideDone = !hideDone;
  var btn = document.getElementById('btn-hide-done');
  if (hideDone) { btn.textContent = '履修済みを表示'; btn.style.borderColor = 'var(--accent)'; btn.style.color = 'var(--accent)'; }
  else { btn.textContent = '履修済みを隠す'; btn.style.borderColor = ''; btn.style.color = ''; }
  renderList();
}
function countAll(h1) {
  var n = 0;
  for (var h2 in DATA[h1]) { for (var h3 in DATA[h1][h2]) { n += DATA[h1][h2][h3].length; } }
  return n;
}
function countH2(h1, h2) {
  var n = 0;
  for (var h3 in DATA[h1][h2]) { n += DATA[h1][h2][h3].length; }
  return n;
}
function countH3(h1, h2, h3) { return DATA[h1][h2][h3] ? DATA[h1][h2][h3].length : 0; }
function getCourses(h1, h2, h3) {
  var res = [];
  if (!h1) { return res; }
  if (!h2) { for (var a in DATA[h1]) { for (var b in DATA[h1][a]) { res = res.concat(DATA[h1][a][b]); } } return res; }
  if (!h3) { for (var c in DATA[h1][h2]) { res = res.concat(DATA[h1][h2][c]); } return res; }
  return DATA[h1][h2][h3] ? DATA[h1][h2][h3] : [];
}
function totalCount() {
  var n = 0;
  for (var h1 in DATA) { for (var h2 in DATA[h1]) { for (var h3 in DATA[h1][h2]) { n += DATA[h1][h2][h3].length; } } }
  return n;
}
function filterCourses(courses) {
  var q = query.toLowerCase(); var res = [];
  for (var i = 0; i < courses.length; i++) {
    var c = courses[i];
    if (hideDone && c.comp === 'True') { continue; }
    if (q && c.name.toLowerCase().indexOf(q) < 0 && c.id.toLowerCase().indexOf(q) < 0) { continue; }
    res.push(c);
  }
  return res;
}
function updateStats() {
  var f = filterCourses(getCourses(sel.h1, sel.h2, sel.h3)).length;
  document.getElementById('stats').innerHTML = '<strong>' + f + '</strong> / ' + totalCount() + ' 件';
}

// ── ツリー描画 ────────────────────────────────────────────
function renderTree() {
  var html = '';
  for (var h1 in DATA) {
    var open = openH1.has(h1);
    var act1 = (sel.h1 === h1 && !sel.h2) ? ' active' : '';
    var h2keys = []; for (var k in DATA[h1]) { h2keys.push(k); }
    html += '<div><div class="h1-row' + act1 + '" onclick="selH1(\'' + ej(h1) + '\')">';
    html += '<span class="chevron' + (open ? ' open' : '') + '">' + chevSvg() + '</span>';
    html += '<span class="h1-name">' + eh(h1) + '</span>';
    html += '<span class="count-badge">' + countAll(h1) + '</span>';
    html += '</div>';
    if (open) {
      html += '<div>';
      for (var hi = 0; hi < h2keys.length; hi++) {
        var h2 = h2keys[hi]; if (!h2) { continue; }
        var key = h1 + '//' + h2; var h2open = openH2.has(key);
        var act2 = (sel.h1 === h1 && sel.h2 === h2 && !sel.h3) ? ' active' : '';
        var h3keys = []; for (var k2 in DATA[h1][h2]) { h3keys.push(k2); }
        var hasH3 = (h3keys.length > 1 || (h3keys.length === 1 && h3keys[0] !== ''));
        html += '<div><div class="h2-row' + act2 + '" onclick="selH2(\'' + ej(h1) + '\',\'' + ej(h2) + '\')">';
        html += '<span class="chevron' + (h2open && hasH3 ? ' open' : '') + '" style="opacity:' + (hasH3 ? '1' : '0.2') + '">' + chevSvg() + '</span>';
        html += '<span class="h2-name">' + eh(h2) + '</span>';
        html += '<span class="count-badge">' + countH2(h1, h2) + '</span>';
        html += '</div>';
        if (h2open && hasH3) {
          html += '<div>';
          for (var hi3 = 0; hi3 < h3keys.length; hi3++) {
            var h3 = h3keys[hi3]; if (!h3) { continue; }
            var act3 = (sel.h1 === h1 && sel.h2 === h2 && sel.h3 === h3) ? ' active' : '';
            html += '<div class="h3-row' + act3 + '" onclick="selH3(\'' + ej(h1) + '\',\'' + ej(h2) + '\',\'' + ej(h3) + '\')">';
            html += '<span class="dot"></span>';
            html += '<span class="h3-name">' + eh(h3) + '</span>';
            html += '<span class="count-badge">' + countH3(h1, h2, h3) + '</span>';
            html += '</div>';
          }
          html += '</div>';
        }
        html += '</div>';
      }
      html += '</div>';
    }
    html += '</div>';
  }
  document.getElementById('tree-panel').innerHTML = html;
}

// ── リスト描画 ────────────────────────────────────────────
function renderList() {
  var courses  = getCourses(sel.h1, sel.h2, sel.h3);
  var filtered = filterCourses(courses);
  var bc = '';
  if (sel.h1) {
    bc = '<span class="current">' + eh(sel.h1) + '</span>';
    if (sel.h2) { bc += '<span class="sep">›</span><span class="current">' + eh(sel.h2) + '</span>'; }
    if (sel.h3) { bc += '<span class="sep">›</span><span class="current">' + eh(sel.h3) + '</span>'; }
  }
  var title = eh(sel.h3 || sel.h2 || sel.h1 || '全科目');
  var html = '<div class="breadcrumb">' + (bc || '<span class="current">全科目</span>') + '</div>';
  html += '<div class="section-header"><div class="section-title">' + title + '</div>';
  html += '<div class="section-count">' + filtered.length + ' 件</div></div>';
  if (!sel.h1 && !query) {
    html += '<div class="empty">左のツリーから分類を選択してください</div>';
    document.getElementById('list-panel').innerHTML = html;
    updateStats(); return;
  }
  if (filtered.length === 0) {
    html += '<div class="empty">条件に一致する科目がありません</div>';
    document.getElementById('list-panel').innerHTML = html;
    updateStats(); return;
  }
  html += '<div class="course-grid">';
  for (var i = 0; i < filtered.length; i++) {
    var c = filtered[i];
    var annot = getAnnot(c.name);
    var cardCls = 'course-card';
    if (c.comp === 'True') { cardCls += ' card-done'; }
    else if (c.danger === 'True') { cardCls += ' card-warn'; }
    var prio = annot.prio || '';
    var slotStr = '';
    if (annot.slots && annot.slots.length) {
      slotStr = annot.slots.map(function(s){ return s[0]+s[1]+'限'; }).join('・');
    }
    html += '<div class="' + cardCls + '" onclick="openModal(\'' + ej(c.id) + '\',\'' + ej(c.name) + '\')">';
    html += '<div class="card-main">';
    html += '<div class="card-name">';
    if (prio) { html += '<span class="prio-badge prio-' + prio + '" style="margin-right:6px">' + prio + '</span>'; }
    html += hlText(c.name, query) + '</div>';
    html += '<div class="card-meta">';
    if (c.form) { html += formTag(c.form); }
    if (c.req)  { html += reqTag(c.req);   }
    if (c.comp === 'True') { html += '<span class="tag tag-done">✓ 履修済み</span>'; }
    if (c.danger === 'True') { html += '<span class="tag tag-warn">⚠ 要注意</span>'; }
    if (slotStr) { html += '<span class="slot-mini">' + eh(slotStr) + '</span>'; }
    if (annot.semester) { html += '<span class="slot-mini">' + eh(annot.semester) + '学期</span>'; }
    html += '</div></div>';
    html += '<div class="card-right">';
    html += '<span class="card-id">' + hlText(c.id, query) + '</span>';
    html += '<span class="units-tag">' + eh(c.units) + '単位</span>';
    if (c.grade) { html += '<span class="grade-tag">' + eh(c.grade) + '年次</span>'; }
    html += '</div>';
    html += '</div>';
  }
  html += '</div>';
  document.getElementById('list-panel').innerHTML = html;
  updateStats();
}

// ── モーダル ──────────────────────────────────────────────
function findCourse(id, name) {
  for (var h1 in DATA) { for (var h2 in DATA[h1]) { for (var h3 in DATA[h1][h2]) {
    var list = DATA[h1][h2][h3];
    for (var i = 0; i < list.length; i++) {
      if (list[i].id === id && (!name || list[i].name === name)) {
        return { c: list[i], h1: h1, h2: h2, h3: h3 };
      }
    }
  }}}
  return null;
}
function openModal(id, name) {

function closeModalDirect() { document.getElementById('modal-bg').classList.remove('open'); }

// ── ツリー選択 ────────────────────────────────────────────
function selH1(h1) {
  if (openH1.has(h1)) { if (sel.h1 === h1 && !sel.h2) { openH1.delete(h1); } } else { openH1.add(h1); }
  sel = { h1: h1, h2: null, h3: null };
  renderTree(); renderList();
}
function selH2(h1, h2) {
  var key = h1 + '//' + h2; var h3keys = [];
  for (var k in DATA[h1][h2]) { if (k) { h3keys.push(k); } }
  if (h3keys.length) {
    if (openH2.has(key)) { if (sel.h1 === h1 && sel.h2 === h2 && !sel.h3) { openH2.delete(key); } } else { openH2.add(key); }
  }
  if (!openH1.has(h1)) { openH1.add(h1); }
  sel = { h1: h1, h2: h2, h3: null };
  renderTree(); renderList();
}
function selH3(h1, h2, h3) {
  openH1.add(h1); openH2.add(h1 + '//' + h2);
  sel = { h1: h1, h2: h2, h3: h3 };
  renderTree(); renderList();
}
function expandAll() {
  for (var h1 in DATA) { openH1.add(h1); for (var h2 in DATA[h1]) { if (h2) { openH2.add(h1 + '//' + h2); } } }
  renderTree();
}
function collapseAll() { openH1.clear(); openH2.clear(); renderTree(); }
function onSearch() { query = document.getElementById('search').value.trim(); renderList(); }

// ── カレンダー ────────────────────────────────────────────
var calSemFilter = '春';
var calPrioFilter = { A:true, B:true, C:true, D:false };

function setCalSemFilter(f) { calSemFilter = f; renderCalendar(); }
function toggleCalPrio(p) { calPrioFilter[p] = !calPrioFilter[p]; renderCalendar(); }

function getCalendarMap() {
  var map = {};
  var days    = ['月','火','水','木','金'];
  var periods = ['1','2','3','4','5'];
  for (var di = 0; di < days.length; di++) {
    for (var pi = 0; pi < periods.length; pi++) { map[days[di] + '_' + periods[pi]] = []; }
  }
  for (var h1 in DATA) { for (var h2 in DATA[h1]) { for (var h3 in DATA[h1][h2]) {
    var list = DATA[h1][h2][h3];
    for (var i = 0; i < list.length; i++) {
      var c = list[i];
      if (c.comp === 'True' || c.danger === 'True') continue;
      var annot = getAnnot(c.name);
      var prio = annot.prio || '';
      if (prio && !calPrioFilter[prio]) continue;
      var sem = annot.semester || '';
      if (calSemFilter && sem && sem !== '春秋' && sem !== calSemFilter) continue;
      var slots = annot.slots || [];
      for (var j = 0; j < slots.length; j++) {
        var key = slots[j][0] + '_' + slots[j][1];
        if (map[key] !== undefined) { map[key].push({ c: c, prio: annot.prio || '' }); }
      }
    }
  }}}
  return map;
}

var PRIO_ORDER = { 'A':1, 'B':2, 'C':3, 'D':4, '':5 };
function sortByPrio(entries) {
  return entries.slice().sort(function(a, b) { return (PRIO_ORDER[a.prio] || 4) - (PRIO_ORDER[b.prio] || 4); });
}

function renderCalendar() {
  var lp = document.getElementById('list-panel');
  var map = getCalendarMap();
  var days    = ['月','火','水','木','金'];
  var periods = ['1','2','3','4','5'];
  var sems    = [['春', '春学期'], ['秋', '秋学期']];

  var h = '<div class="cal-wrap">';
  h += '<div class="cal-controls">';
  h += '<span class="cal-control-label">学期</span><div class="cal-filter-btns">';
  for (var si = 0; si < sems.length; si++) {
    var sv = sems[si][0]; var sl = sems[si][1];
    var sc = (calSemFilter === sv) ? ' active' : '';
    h += '<button class="cal-filter-btn' + sc + '" onclick="setCalSemFilter(\'' + sv + '\')">' + sl + '</button>';
  }
  h += '</div>';
  var prioLabels = { A:'絶対受けたい', B:'受けたい', C:'選択肢には入れとく', D:'絶対受けたくない' };
  h += '<div class="cal-prio-filter">';
  ['A','B','C','D'].forEach(function(p) {
    var chk = calPrioFilter[p] ? ' checked' : '';
    h += '<label class="cal-prio-item"><input type="checkbox"' + chk + ' onchange="toggleCalPrio(\'' + p + '\')">';
    h += '<span class="prio-badge prio-' + p + '">' + p + '</span>';
    h += '<span>' + prioLabels[p] + '</span></label>';
  });
  h += '</div>';
  h += '<span class="cal-tip">空セルクリック→不可マーク</span>';
  h += '</div>';

  h += '<div class="cal-scroll"><div class="cal-grid">';
  h += '<div class="cal-corner"></div>';
  for (var di = 0; di < days.length; di++) { h += '<div class="cal-hcell">' + days[di] + '</div>'; }
  for (var pi = 0; pi < periods.length; pi++) {
    h += '<div class="cal-period-label">' + periods[pi] + '</div>';
    for (var di2 = 0; di2 < days.length; di2++) {
      var key = days[di2] + '_' + periods[pi];
      var isBusy = !!BUSY[key];
      var entries = sortByPrio(map[key] || []);
      var cellCls = 'cal-cell' + (isBusy ? ' busy' : '');
      h += '<div class="' + cellCls + '" onclick="onCalCellClick(\'' + key + '\')" data-key="' + key + '">';
      if (entries.length > 1) { h += '<span class="cal-conflict-badge">競合 ' + entries.length + '</span>'; }
      for (var ei = 0; ei < entries.length; ei++) {
        var en = entries[ei];
        h += '<div class="cal-chip prio-' + en.prio + '" data-id="' + eh(en.c.id) + '" data-name="' + eh(en.c.name) + '" onclick="onCalChipClick(event,this)">'
           + eh(en.c.name) + '</div>';
      }
      h += '</div>';
    }
  }
  h += '</div></div>';
  h += '<div class="cal-legend">';
  var legends = [['A','var(--prio-a)','絶対受けたい'],['B','var(--prio-b)','受けたい'],['C','var(--prio-c)','選択肢'],['D','var(--prio-d)','受けたくない'],['','var(--border2)','優先度なし']];
  for (var li = 0; li < legends.length; li++) {
    h += '<div class="cal-legend-item"><div class="cal-legend-dot" style="background:' + legends[li][1] + '"></div>' + legends[li][2] + '</div>';
  }
  h += '</div></div>';
  lp.innerHTML = h;
}

function onCalCellClick(key) {
  BUSY[key] = !BUSY[key];
  if (!BUSY[key]) { delete BUSY[key]; }
  saveBusy();
  renderCalendar();
}
function onCalChipClick(e, el) {
  e.stopPropagation();
  var id = el.getAttribute('data-id');
  var name = el.getAttribute('data-name');
  openModal(id, name);
}

// ── シラバス ──────────────────────────────────────────────
var toastTimer = null;
function showToast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { el.classList.remove('show'); }, 2500);
}
function openSyllabus() {
  var name = document.getElementById('modal-name').textContent.trim();
  window.open('https://3s.musashi.ac.jp/uprx/up/pk/pky001/Pky00101.xhtml?guestlogin=Kmh006', '_blank');
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(name).then(function() {
      showToast('「' + name + '」をコピー ✓  上の検索欄に貼り付けてください');
    }).catch(function() {
      showToast('3Sを開きました（手動で科目名を入力してください）');
    });
  } else {
    try {
      var ta = document.createElement('textarea');
      ta.value = name; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.focus(); ta.select();
      document.execCommand('copy'); document.body.removeChild(ta);
      showToast('「' + name + '」をコピー ✓  上の検索欄に貼り付けてください');
    } catch(e) {
      showToast('3Sを開きました（手動で科目名を入力してください）');
    }
  }
}

initCreditsCollapsed();
sel = { h1: null, h2: null, h3: null };
openH1 = new Set();
openH2 = new Set();
query = '';
renderTree();
renderList();
updateStats();
</script>
